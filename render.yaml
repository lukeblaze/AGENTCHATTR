services:
  - type: web
    name: agentchattr
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/status
    envVars:
      - key: AGENTCHATTR_ALLOW_NETWORK
        value: "1"
      - key: AGENTCHATTR_HOST
        value: 0.0.0.0
      - key: AGENTCHATTR_BRIDGE_ENABLED
        value: "1"
      - key: AGENTCHATTR_BRIDGE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: AGENTCHATTR_AUTO_START_WRAPPERS
        value: "1"
      - key: AGENTCHATTR_AUTO_START_AGENTS
        value: all
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
